<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Builder</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .container { max-width: 600px; width: 100%; text-align: center; }
    .logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 30px auto 20px; font-size: 36px;
      box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
    }
    h1 {
      font-size: 28px; margin-bottom: 8px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #94a3b8; font-size: 15px; margin-bottom: 40px; }
    .upload-area {
      border: 2px dashed rgba(96, 165, 250, 0.3);
      border-radius: 20px; padding: 50px 30px;
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.3s; cursor: pointer; position: relative;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #60a5fa;
      background: rgba(96, 165, 250, 0.05);
    }
    .upload-icon { font-size: 48px; margin-bottom: 15px; }
    .upload-text { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .upload-hint { color: #64748b; font-size: 13px; }
    #fileInput { display: none; }
    .file-info {
      display: none;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px; padding: 20px;
      margin-top: 20px; text-align: left;
    }
    .file-info.show { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .file-name { font-weight: 600; color: #60a5fa; margin-bottom: 5px; word-break: break-all; }
    .file-size { color: #64748b; font-size: 13px; }
    .preview-section { display: none; margin-top: 25px; }
    .preview-section.show { display: block; animation: fadeIn 0.4s; }
    .preview-title {
      font-size: 14px; color: #94a3b8; margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .phone-frame {
      width: 280px; height: 500px;
      background: #000; border-radius: 35px;
      padding: 12px; margin: 0 auto;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      border: 3px solid #334155;
    }
    .phone-screen {
      width: 100%; height: 100%;
      background: #0f172a; border-radius: 25px;
      overflow: hidden; position: relative;
    }
    .phone-notch {
      position: absolute; top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100px; height: 25px;
      background: #000; border-radius: 0 0 15px 15px;
      z-index: 10;
    }
    .preview-iframe { width: 100%; height: 100%; border: none; background: #fff; }
    .install-btn {
      display: none; width: 100%; padding: 16px;
      margin-top: 25px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white; border: none; border-radius: 14px;
      font-size: 17px; font-weight: 700;
      cursor: pointer; transition: all 0.3s;
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.3);
    }
    .install-btn.show { display: block; animation: fadeIn 0.4s; }
    .install-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(59, 130, 246, 0.4); }
    .install-btn:active { transform: scale(0.98); }
    .settings { display: none; margin-top: 20px; text-align: left; }
    .settings.show { display: block; animation: fadeIn 0.3s; }
    .setting-group { margin-bottom: 15px; }
    .setting-label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    .setting-input {
      width: 100%; padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px; color: #e2e8f0;
      font-size: 15px; outline: none;
      transition: border-color 0.2s;
    }
    .setting-input:focus { border-color: #60a5fa; }
    .color-picker-wrapper { display: flex; gap: 10px; align-items: center; }
    .color-picker { width: 50px; height: 40px; border: none; border-radius: 8px; cursor: pointer; }
    .steps { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
    .step {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      opacity: 0.4; transition: opacity 0.3s;
    }
    .step.active { opacity: 1; }
    .step.completed { opacity: 0.7; }
    .step-number {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(96, 165, 250, 0.2);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
    }
    .step.active .step-number { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
    .step-label { font-size: 12px; color: #94a3b8; }
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(96, 165, 250, 0.3);
      padding: 14px 24px; border-radius: 12px;
      font-size: 14px; z-index: 1000;
      transition: transform 0.3s;
      backdrop-filter: blur(10px);
      max-width: 90%; text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .loading {
      display: none; margin: 20px auto;
      width: 40px; height: 40px;
      border: 3px solid rgba(96, 165, 250, 0.2);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading.show { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { margin-top: auto; padding: 30px; color: #475569; font-size: 12px; }
    .download-btn {
      display: none; width: 100%; padding: 14px;
      margin-top: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #60a5fa;
      border: 1px solid rgba(96, 165, 250, 0.3);
      border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.3s;
    }
    .download-btn.show { display: block; }
    .download-btn:hover { background: rgba(96, 165, 250, 0.1); }
    .reset-btn {
      display: none; width: 100%; padding: 12px;
      margin-top: 10px;
      background: transparent; color: #64748b;
      border: 1px solid rgba(100, 116, 139, 0.3);
      border-radius: 10px; font-size: 14px;
      cursor: pointer; transition: all 0.3s;
    }
    .reset-btn.show { display: block; }
    .reset-btn:hover { color: #e2e8f0; border-color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">📱</div>
    <h1>PWA Builder</h1>
    <p class="subtitle">আপনার HTML ফাইলকে নেটিভ অ্যাপে রূপান্তর করুন</p>

    <div class="steps">
      <div class="step active" id="step1">
        <div class="step-number">1</div>
        <span class="step-label">ফাইল আপলোড</span>
      </div>
      <div class="step" id="step2">
        <div class="step-number">2</div>
        <span class="step-label">সেটিংস</span>
      </div>
      <div class="step" id="step3">
        <div class="step-number">3</div>
        <span class="step-label">ইনস্টল</span>
      </div>
    </div>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📁</div>
      <div class="upload-text">HTML ফাইল সিলেক্ট করুন</div>
      <div class="upload-hint">অথবা এখানে ড্র্যাগ করুন (.html)</div>
      <input type="file" id="fileInput" accept=".html,.htm">
    </div>

    <div class="loading" id="loading"></div>

    <div class="file-info" id="fileInfo">
      <div class="file-name" id="fileName"></div>
      <div class="file-size" id="fileSize"></div>
    </div>

    <div class="settings" id="settings">
      <div class="setting-group">
        <label class="setting-label">অ্যাপের নাম</label>
        <input type="text" class="setting-input" id="appName" placeholder="আমার অ্যাপ" value="আমার অ্যাপ">
      </div>
      <div class="setting-group">
        <label class="setting-label">থিম কালার</label>
        <div class="color-picker-wrapper">
          <input type="color" class="color-picker" id="themeColor" value="#0f172a">
          <input type="text" class="setting-input" id="themeColorText" value="#0f172a" style="flex:1;">
        </div>
      </div>
      <div class="setting-group">
        <label class="setting-label">ব্যাকগ্রাউন্ড কালার</label>
        <div class="color-picker-wrapper">
          <input type="color" class="color-picker" id="bgColor" value="#ffffff">
          <input type="text" class="setting-input" id="bgColorText" value="#ffffff" style="flex:1;">
        </div>
      </div>
    </div>

    <div class="preview-section" id="previewSection">
      <div class="preview-title">প্রিভিউ</div>
      <div class="phone-frame">
        <div class="phone-screen">
          <div class="phone-notch"></div>
          <iframe class="preview-iframe" id="previewFrame" sandbox="allow-scripts"></iframe>
        </div>
      </div>
    </div>

    <button class="install-btn" id="installBtn">📲 PWA হিসেবে ওপেন করুন</button>
    <button class="download-btn" id="downloadBtn">💾 HTML ফাইল ডাউনলোড করুন</button>
    <button class="reset-btn" id="resetBtn">🔄 নতুন ফাইল আপলোড করুন</button>
  </div>

  <div class="toast" id="toast"></div>

  <footer>Client-side PWA Builder</footer>

  <script>
    (function() {
      "use strict";

      var uploadArea = document.getElementById("uploadArea");
      var fileInput = document.getElementById("fileInput");
      var fileInfo = document.getElementById("fileInfo");
      var fileNameEl = document.getElementById("fileName");
      var fileSizeEl = document.getElementById("fileSize");
      var loading = document.getElementById("loading");
      var settings = document.getElementById("settings");
      var previewSection = document.getElementById("previewSection");
      var previewFrame = document.getElementById("previewFrame");
      var installBtn = document.getElementById("installBtn");
      var downloadBtn = document.getElementById("downloadBtn");
      var resetBtn = document.getElementById("resetBtn");
      var toast = document.getElementById("toast");

      var appNameInput = document.getElementById("appName");
      var themeColorPicker = document.getElementById("themeColor");
      var themeColorText = document.getElementById("themeColorText");
      var bgColorPicker = document.getElementById("bgColor");
      var bgColorText = document.getElementById("bgColorText");

      var step1 = document.getElementById("step1");
      var step2 = document.getElementById("step2");
      var step3 = document.getElementById("step3");

      var uploadedHTML = "";
      var generatedBlobUrl = "";
      var generatedFileName = "";

      themeColorPicker.addEventListener("input", function(e) {
        themeColorText.value = e.target.value;
        if (uploadedHTML) generatePreview();
      });
      themeColorText.addEventListener("input", function(e) {
        themeColorPicker.value = e.target.value;
        if (uploadedHTML) generatePreview();
      });

      bgColorPicker.addEventListener("input", function(e) {
        bgColorText.value = e.target.value;
      });
      bgColorText.addEventListener("input", function(e) {
        bgColorPicker.value = e.target.value;
      });

      uploadArea.addEventListener("click", function() { fileInput.click(); });

      uploadArea.addEventListener("dragover", function(e) {
        e.preventDefault();
        uploadArea.classList.add("dragover");
      });

      uploadArea.addEventListener("dragleave", function() {
        uploadArea.classList.remove("dragover");
      });

      uploadArea.addEventListener("drop", function(e) {
        e.preventDefault();
        uploadArea.classList.remove("dragover");
        var files = e.dataTransfer.files;
        if (files.length > 0) handleFile(files[0]);
      });

      fileInput.addEventListener("change", function(e) {
        if (e.target.files.length > 0) handleFile(e.target.files[0]);
      });

      function handleFile(file) {
        var fname = file.name.toLowerCase();
        if (!fname.endsWith(".html") && !fname.endsWith(".htm")) {
          showToast("❌ শুধু HTML ফাইল আপলোড করুন");
          return;
        }

        loading.classList.add("show");
        uploadArea.style.display = "none";

        var reader = new FileReader();
        reader.onload = function(e) {
          uploadedHTML = e.target.result;

          fileNameEl.textContent = file.name;
          fileSizeEl.textContent = formatSize(file.size);
          fileInfo.classList.add("show");

          step1.classList.remove("active");
          step1.classList.add("completed");
          step2.classList.add("active");

          settings.classList.add("show");

          generatePreview();

          loading.classList.remove("show");
          showToast("✅ ফাইল আপলোড সফল!");
        };
        reader.onerror = function() {
          loading.classList.remove("show");
          uploadArea.style.display = "block";
          showToast("❌ ফাইল পড়তে সমস্যা হয়েছে");
        };
        reader.readAsText(file);
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }

      function generatePreview() {
        var name = appNameInput.value || "আমার অ্যাপ";
        var theme = themeColorPicker.value;
        var bg = bgColorPicker.value;

        var pwaHTML = wrapAsPWA(uploadedHTML, name, theme, bg);

        if (generatedBlobUrl) URL.revokeObjectURL(generatedBlobUrl);
        var blob = new Blob([pwaHTML], { type: "text/html" });
        generatedBlobUrl = URL.createObjectURL(blob);
        generatedFileName = name.replace(/\s/g, "-").toLowerCase() + "-pwa.html";

        previewFrame.src = generatedBlobUrl;
        previewSection.classList.add("show");
        installBtn.classList.add("show");
        downloadBtn.classList.add("show");
        resetBtn.classList.add("show");

        step2.classList.remove("active");
        step2.classList.add("completed");
        step3.classList.add("active");
      }

      function wrapAsPWA(html, name, themeColor, bgColor) {
        var bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
        var bodyContent = bodyMatch ? bodyMatch[1] : html;

        var headMatch = html.match(/<head[^>]*>([\s\S]*)<\/head>/i);
        var headContent = headMatch ? headMatch[1] : "";

        var titleMatch = html.match(/<title>(.*?)<\/title>/i);
        var pageTitle = titleMatch ? titleMatch[1] : name;

        var styleMatches = headContent.match(/<style[^>]*>[\s\S]*?<\/style>/gi) || [];
        var scriptMatches = headContent.match(/<script[^>]*>[\s\S]*?<\/script>/gi) || [];
        var linkMatches = headContent.match(/<link[^>]*>/gi) || [];

        var iconSvg = generateIconSVG(themeColor, name);
        var manifestObj = {
          name: name,
          short_name: name.slice(0, 12),
          description: name + " - PWA App",
          start_url: "./",
          display: "standalone",
          orientation: "portrait",
          background_color: bgColor,
          theme_color: themeColor,
          scope: "./",
          lang: "bn",
          icons: [
            { src: "data:image/svg+xml;base64," + iconSvg, sizes: "192x192", type: "image/svg+xml" },
            { src: "data:image/svg+xml;base64," + iconSvg, sizes: "512x512", type: "image/svg+xml" }
          ]
        };

        var doc = document.implementation.createHTMLDocument("");
        doc.documentElement.setAttribute("lang", "bn");

        var head = doc.head;

        var metaCharset = doc.createElement("meta");
        metaCharset.setAttribute("charset", "UTF-8");
        head.appendChild(metaCharset);

        var metaViewport = doc.createElement("meta");
        metaViewport.setAttribute("name", "viewport");
        metaViewport.setAttribute("content", "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no");
        head.appendChild(metaViewport);

        var metaTheme = doc.createElement("meta");
        metaTheme.setAttribute("name", "theme-color");
        metaTheme.setAttribute("content", themeColor);
        head.appendChild(metaTheme);

        var metaBg = doc.createElement("meta");
        metaBg.setAttribute("name", "background-color");
        metaBg.setAttribute("content", bgColor);
        head.appendChild(metaBg);

        var metaApple = doc.createElement("meta");
        metaApple.setAttribute("name", "apple-mobile-web-app-capable");
        metaApple.setAttribute("content", "yes");
        head.appendChild(metaApple);

        var metaAppleStyle = doc.createElement("meta");
        metaAppleStyle.setAttribute("name", "apple-mobile-web-app-status-bar-style");
        metaAppleStyle.setAttribute("content", "black-translucent");
        head.appendChild(metaAppleStyle);

        var metaAppleTitle = doc.createElement("meta");
        metaAppleTitle.setAttribute("name", "apple-mobile-web-app-title");
        metaAppleTitle.setAttribute("content", name);
        head.appendChild(metaAppleTitle);

        var title = doc.createElement("title");
        title.textContent = pageTitle;
        head.appendChild(title);

        var manifestLink = doc.createElement("link");
        manifestLink.setAttribute("rel", "manifest");
        manifestLink.setAttribute("href", "data:application/json;base64," + btoa(JSON.stringify(manifestObj)));
        head.appendChild(manifestLink);

        var iconLink = doc.createElement("link");
        iconLink.setAttribute("rel", "apple-touch-icon");
        iconLink.setAttribute("href", "data:image/svg+xml;base64," + iconSvg);
        head.appendChild(iconLink);

        var faviconLink = doc.createElement("link");
        faviconLink.setAttribute("rel", "icon");
        faviconLink.setAttribute("type", "image/svg+xml");
        faviconLink.setAttribute("href", "data:image/svg+xml;base64," + iconSvg);
        head.appendChild(faviconLink);

        styleMatches.forEach(function(styleTag) {
          var div = document.createElement("div");
          div.innerHTML = styleTag;
          if (div.firstChild) head.appendChild(div.firstChild);
        });

        linkMatches.forEach(function(linkTag) {
          var div = document.createElement("div");
          div.innerHTML = linkTag;
          if (div.firstChild) head.appendChild(div.firstChild);
        });

        var pwaStyle = doc.createElement("style");
        pwaStyle.textContent = [
          "html, body { margin: 0; padding: 0; min-height: 100vh; min-height: 100dvh; width: 100%; -webkit-tap-highlight-color: transparent; }",
          "body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }",
          "* { -webkit-overflow-scrolling: touch; }",
          "::-webkit-scrollbar { width: 0px; background: transparent; }"
        ].join("
");
        head.appendChild(pwaStyle);

        scriptMatches.forEach(function(scriptTag) {
          var div = document.createElement("div");
          div.innerHTML = scriptTag;
          if (div.firstChild) head.appendChild(div.firstChild);
        });

        var body = doc.body;
        body.innerHTML = bodyContent;

        var swScript = doc.createElement("script");
        var swCode = [
          "self.addEventListener('install',function(e){",
          "  e.waitUntil(caches.open('pwa-cache').then(function(c){return c.addAll(['./']);}));",
          "  self.skipWaiting();",
          "});",
          "self.addEventListener('activate',function(e){",
          "  e.waitUntil(self.clients.claim());",
          "});",
          "self.addEventListener('fetch',function(e){",
          "  e.respondWith(caches.match(e.request).then(function(r){",
          "    return r||fetch(e.request).catch(function(){return new Response('Offline',{status:503});});",
          "  }));",
          "});"
        ].join("
");

        var swInit = [
          "(function() {",
          "  var swBlob = new Blob(['" + swCode.replace(/'/g, "\'") + "'], { type: 'application/javascript' });",
          "  var swUrl = URL.createObjectURL(swBlob);",
          "  if ('serviceWorker' in navigator) {",
          "    navigator.serviceWorker.register(swUrl).catch(function(e) { console.log('SW:', e); });",
          "  }",
          "})();"
        ].join("
");

        swScript.textContent = swInit;
        body.appendChild(swScript);

        return "<!DOCTYPE html>
" + doc.documentElement.outerHTML;
      }

      function generateIconSVG(color, name) {
        var initial = name.charAt(0).toUpperCase();
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="128" fill="' + color + '"/><text x="256" y="320" font-family="Arial,sans-serif" font-size="240" font-weight="bold" fill="white" text-anchor="middle">' + initial + '</text></svg>';
        return btoa(svg);
      }

      installBtn.addEventListener("click", function() {
        if (!generatedBlobUrl) return;
        window.open(generatedBlobUrl, "_blank");
        showToast("📱 নতুন ট্যাবে ওপেন হয়েছে। Chrome মেনু থেকে \"Add to Home Screen\" চাপুন!");
      });

      downloadBtn.addEventListener("click", function() {
        if (!generatedBlobUrl) return;
        var a = document.createElement("a");
        a.href = generatedBlobUrl;
        a.download = generatedFileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showToast("💾 ফাইল ডাউনলোড হয়েছে!");
      });

      resetBtn.addEventListener("click", function() {
        uploadedHTML = "";
        if (generatedBlobUrl) URL.revokeObjectURL(generatedBlobUrl);
        generatedBlobUrl = "";
        generatedFileName = "";

        fileInput.value = "";
        uploadArea.style.display = "block";
        fileInfo.classList.remove("show");
        settings.classList.remove("show");
        previewSection.classList.remove("show");
        installBtn.classList.remove("show");
        downloadBtn.classList.remove("show");
        resetBtn.classList.remove("show");
        previewFrame.src = "";

        step1.classList.add("active");
        step1.classList.remove("completed");
        step2.classList.remove("active");
        step2.classList.remove("completed");
        step3.classList.remove("active");

        showToast("🔄 নতুন ফাইল আপলোড করুন");
      });

      appNameInput.addEventListener("input", function() {
        if (uploadedHTML) generatePreview();
      });

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(function() {
          toast.classList.remove("show");
        }, 5000);
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(function() {});
      }

    })();
  </script>
</body>
</html>
